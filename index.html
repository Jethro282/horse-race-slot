<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Horse Race Slot Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1b5e20;
      color: #fff;
      text-align: center;
    }
    .track {
      width: 90%;
      margin: 20px auto;
      background: #2e7d32;
      padding: 10px;
      border-radius: 12px;
    }
    .lane {
      position: relative;
      height: 50px;
      margin: 8px 0;
      background: #66bb6a;
      border-radius: 6px;
      overflow: hidden;
    }
    .horse {
      position: absolute;
      left: 0;
      top: 5px;
      height: 40px;
      width: 40px;
      background: saddlebrown;
      border-radius: 50%;
      line-height: 40px;
      font-size: 12px;
    }
    .barrier {
      position: absolute;
      right: 40%;
      top: 0;
      width: 6px;
      height: 100%;
      background: #3e2723;
    }
    .finish {
      position: absolute;
      right: 5px;
      top: 0;
      width: 6px;
      height: 100%;
      background: white;
    }
    .controls {
      margin: 15px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    .stats {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
